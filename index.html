<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Những Năm Tháng Cấp 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand" id="brandTitle">Những Năm Tháng Cấp 3</div>
      <button class="share-btn" id="shareButton" type="button">Chia sẻ</button>
    </header>

    <main class="hero">
      <section class="memory-stage" id="memoryStage" aria-live="polite"></section>

      <aside class="story-panel">
        <div class="story-kicker" id="storyKicker">Memory Lane</div>
        <h1 class="story-title" id="storyTitle">Những Năm Tháng Cấp 3</h1>
        <div class="story-meta">
          <span id="schoolName">Tên trường</span>
          <span id="schoolYears">2021 - 2024</span>
        </div>
        <p class="story-description" id="storyDescription">
          Mỗi thước phim và mỗi bức ảnh là một mảnh ghép nhỏ của những năm tháng tuổi trẻ.
        </p>
        <div class="memory-count">
          <strong id="memoryNumber">01</strong>
          <span id="memoryTitleMeta">Kỷ niệm đầu tiên</span>
        </div>
      </aside>
    </main>
  </div>

  <div class="filmstrip-wrap">
    <section class="memory-slider" aria-label="Điều hướng kỷ niệm">
      <div class="memory-slider-head">
        <div class="memory-slider-title" id="sliderTitle">Memory Lane</div>
        <div class="memory-slider-subtitle" id="sliderSubtitle">Lướt để chuyển kỷ niệm</div>
      </div>
      <nav class="filmstrip" id="filmstrip" aria-label="Điều hướng kỷ niệm"></nav>
    </section>
  </div>

  <div class="toast" id="toast">Đã sao chép liên kết</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
